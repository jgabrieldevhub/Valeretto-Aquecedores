<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeretto Aquecedores - Valeretto</title>
    <link rel="stylesheet" href="./src/css/bootstrap.min.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="icon" href="./src/img/transparent_png/cropped-Valeretto-favicon-192x192.png" sizes="192x192">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg shadow-sm">
            <div class="container container-fluid">
                <a class="logo navbar-brand" href="#"><img src="./src/img/transparent_png/cropped-Valeretto-Logo.png"
                        alt=""></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="ms-auto navbar-nav">
                        <li class="nav-item dropdown text">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Produtos
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Aquecedor a Gás</a></li>
                                <li><a class="dropdown-item" href="#">Aquecedor Solar</a></li>
                                <li><a class="dropdown-item" href="#">Aquecedor Solar de Piscina</a></li>
                                <li><a class="dropdown-item" href="#">Iluminação de Piscina</a></li>
                                <li><a class="dropdown-item" href="#">Pressurizadoras</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">Nossa História</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Blog</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contato</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="carouselExampleIndicators" class="carousel slide container mt-2 mb-2">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                <img src="./src/img/Piscina_iluminada_resort.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                <img src="./src/img/piscina_iluminada_panoramica.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                <img src="./src/img/piscina_aquecida_panoramica.jpg" class="d-block w-100" alt="...">
                </div>
            </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
        </div>
    </main>

    <script src="./src/js/bootstrap.bundle.min.js"></script>
    <script src="./src/js/script.js"></script>

</body>

</html>
