<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valeretto Aquecedores - Valeretto</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/transparent_png/cropped-Valeretto-favicon-192x192.png" sizes="192x192">
</head>
<body>

    <header class="header shadow-sm">
        <section class="d-flex align-items-center text-center justify-content-between">
            <a href="#" class="logo">
                <img src="./img/transparent_png/cropped-Valeretto-Logo.png" alt="">
            </a>
            
            <nav class="navbar ms-auto me-auto">
                <a href="#">Produtos</a>
                <a href="#">Nossa História</a>
                <a href="#">Contato</a>
            </nav>

            <form class="search d-flex text-center justify-content-center border border-secundary rounded-2">
                <input type="text" class="search-bar ms-2 w-100 h-100" placeholder="Pesquisar">
                <button type="submit" class="search-button me-2 bg-transparent">
                    <img width="26" height="26" src="https://img.icons8.com/ios-filled/26/ec9744/search--v1.png" alt="search--v1"/>
                </button>
            </form>

            <div class="login-box d-flex align-items-center gap-1 ms-auto">
                <img class="login-icon" width="32" height="32" src="https://img.icons8.com/pastel-glyph/32/ec9744/user-male-circle.png" alt="user-male-circle"/>
                <div class="login-text">
                    <b>Entre</b>
                    ou
                    <br>
                    <b>Cadastre-se</b>
                </div>
            </div>
        </section>
    </header>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
